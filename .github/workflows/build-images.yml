name: Build and publish tool images

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.list.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          tools=$(find . -mindepth 1 -maxdepth 1 -type d -not -path './.git' -not -path './.github' -exec test -e '{}/Dockerfile' \; -print | sed 's|^\./||' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "tools=$tools" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    if: needs.discover.outputs.tools != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        tool: ${{ fromJson(needs.discover.outputs.tools) }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.tool }}
          push: true
          tags: |
            ghcr.io/genomixcloud/${{ matrix.tool }}:latest
            ghcr.io/genomixcloud/${{ matrix.tool }}:${{ github.sha }}
